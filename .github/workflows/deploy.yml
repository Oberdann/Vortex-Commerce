name: CI/CD - Vortex Commerce

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo com submodules
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install cloudflared
        run: |
          curl -LO https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared version

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via Cloudflare Tunnel
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ssh.pedrolg.site
        run: |
          ssh -v -T -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname $VPS_HOST --service-token-id $CF_ACCESS_CLIENT_ID --service-token-secret $CF_ACCESS_CLIENT_SECRET" \
              $VPS_USER@$VPS_HOST \
              "set -e && cd Vortex-Commerce && \
              git pull && \
              git submodule foreach --recursive 'git fetch origin && git checkout \$(git rev-parse HEAD)' && \
              LAST_COMMIT_FILE=.last_commit_hash && \
              LATEST_HASH=\$(git rev-parse HEAD) && \
              if [ ! -f \$LAST_COMMIT_FILE ] || [ \"\$(cat \$LAST_COMMIT_FILE)\" != \"\$LATEST_HASH\" ]; then \
                  echo 'Código mudou, rebuildando containers...' && \
                  docker compose build && \
                  docker compose up -d && \
                  echo \$LATEST_HASH > \$LAST_COMMIT_FILE; \
              else \
                  echo 'Nenhuma mudança detectada, containers mantidos.'; \
              fi"