jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo com submodules
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install cloudflared
        run: |
          curl -LO https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via Cloudflare Tunnel
        env:
          TUNNEL_SERVICE_AUTH_ID: ${{ secrets.CF_CLIENT_ID }}
          TUNNEL_SERVICE_AUTH_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          # Adicionado StrictHostKeyChecking=no para não travar na primeira conexão
          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.VPS_HOST }}" \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e
          cd vortex-commerce
          git pull
          git submodule update --init --recursive
          docker compose up -d --build
          EOF # <-- Faltava fechar o bloco aqui