name: CI/CD - Vortex Commerce

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo com submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cloudflared
        run: |
          curl -LO https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via Cloudflare Tunnel
        run: |
          ssh -T -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.VPS_HOST }} --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_SECRET_SECRET }}" \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "set -e && cd vortex-commerce && git pull && git submodule update --init --recursive && docker compose up -d --build"