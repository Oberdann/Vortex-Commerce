server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker

    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    pipeline_stages:
      - docker: {}

      - json:
          expressions:
            service: service
            level: level
            traceId: traceId
            spanId: spanId
            method: req.method
            url: req.url

      - labels:
          service:
          level:
          method:
          traceId:

    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(users-service|auth-service|products-service|orders-services|payments-services|notifications-services)"
        action: keep

      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"

      - source_labels: ["container"]
        target_label: "job"

