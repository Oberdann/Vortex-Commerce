services:
  api-gateway:
    image: oberdanandrade/vortex-api-gateway:latest
    container_name: api-gateway
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    networks:
      - vortex-network

  products-service:
    image: oberdanandrade/vortex-products:latest
    container_name: products-service
    restart: always
    env_file: .env
    ports:
      - "4000:3000"
    networks:
      - vortex-network

networks:
  vortex-network:
    driver: bridge