services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api-gateway
    networks:
      - vortex-network

  api-gateway:
    image: oberdanandrade/vortex-api-gateway:latest
    container_name: api-gateway
    restart: always
    env_file: .env
    expose:
      - "3000"
    networks:
      - vortex-network

  products-service:
    image: oberdanandrade/vortex-products:latest
    container_name: products-service
    restart: always
    env_file: .env
    expose:
      - "3000"
    networks:
      - vortex-network

  users-service:
    image: oberdanandrade/vortex-users:latest
    container_name: users-service
    restart: always
    env_file: .env
    expose:
      - "3000"
    networks:
      - vortex-network

  auth-service:
    image: oberdanandrade/vortex-auth:latest
    container_name: auth-service
    restart: always
    env_file: .env
    expose:
      - "3000"
    networks:
      - vortex-network

networks:
  vortex-network:
    external: true